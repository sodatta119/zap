name: Release

# Push a tag like v0.1.0 to build installers and attach them to a GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked
      - name: Build .app + .dmg (Zap + Zulu)
        working-directory: networking
        run: |
          ( cd crates/zap-desktop && cargo bundle --release )
          ( cd crates/zulu-desktop && cargo bundle --release )
      - name: Build CLI
        working-directory: networking
        run: cargo build --release --package zap-cli
      - name: Collect artifacts
        run: |
          mkdir -p dist/zap dist/zulu
          cp networking/target/release/bundle/dmg/zap.dmg dist/zap/zap-macos.dmg
          cp networking/target/release/bundle/dmg/Zulu.dmg dist/zulu/zulu-macos.dmg
          cp networking/target/release/zap dist/zap/zap-macos-cli
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zap/zap-macos.dmg
            dist/zulu/zulu-macos.dmg
            dist/zap/zap-macos-cli
      - uses: actions/upload-artifact@v4
        with:
          name: site-zap-macos
          path: dist/zap/zap-macos.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Insurance for TLS crypto asm on MSVC (ring ships pregenerated objects for
      # this target, so this is usually a no-op, but it guarantees a clean build).
      - uses: ilammy/setup-nasm@v1
      - name: Build GUIs + CLI
        working-directory: networking
        run: cargo build --release --package zap-desktop --package zulu-desktop --package zap-cli
      - name: Package zips
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/zap, dist/zulu, staging/zap | Out-Null
          # Zap (file transfer): GUI + CLI zipped together.
          Copy-Item networking/target/release/zap-desktop.exe staging/zap/
          Copy-Item networking/target/release/zap.exe staging/zap/zap-cli.exe
          Compress-Archive -Path staging/zap/* -DestinationPath dist/zap/zap-windows.zip -Force
          # Zulu (clipboard sync): GUI only.
          Compress-Archive -Path networking/target/release/zulu-desktop.exe -DestinationPath dist/zulu/zulu-windows.zip -Force
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zap/zap-windows.zip
            dist/zulu/zulu-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: site-zap-windows
          path: dist/zap/zap-windows.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GUI system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked
      - name: Build .deb + CLI (Zap + Zulu)
        working-directory: networking
        run: |
          ( cd crates/zap-desktop && cargo bundle --release --format deb )
          ( cd crates/zulu-desktop && cargo bundle --release --format deb )
          cargo build --release --package zap-cli
      - name: Collect artifacts
        run: |
          mkdir -p dist/zap dist/zulu
          cp networking/target/release/bundle/deb/zap*.deb dist/zap/zap-linux.deb
          cp networking/target/release/bundle/deb/[Zz]ulu*.deb dist/zulu/zulu-linux.deb
          cp networking/target/release/zap-desktop dist/zap/zap-linux
          cp networking/target/release/zulu-desktop dist/zulu/zulu-linux
          cp networking/target/release/zap dist/zap/zap-linux-cli
          tar -C dist/zap -czf dist/zap/zap-linux.tar.gz zap-linux zap-linux-cli
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zap/zap-linux.deb
            dist/zulu/zulu-linux.deb
            dist/zap/zap-linux.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: site-zap-linux
          path: dist/zap/zap-linux.deb

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      # The Zulu Android app is pure Kotlin (no JNI), so the SDK that ships on
      # the runner is enough - no NDK or Rust cross-compile needed.
      - name: Build APK
        working-directory: networking/android/zulu
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Collect artifact
        run: |
          mkdir -p dist/zulu
          cp networking/android/zulu/app/build/outputs/apk/debug/app-debug.apk dist/zulu/zulu-android.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/zulu/zulu-android.apk

  # Publish the freshly-built Zap desktop installers into the site so Cloudflare
  # (which serves site/) hands out current downloads. Runs after the builds and
  # commits the files to main. This workflow only triggers on `v*` tags, so a
  # push to main here never re-triggers it (no loop).
  publish-site:
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage installers into site/zap/download
        run: |
          d=site/zap/download
          mkdir -p "$d"
          cp artifacts/site-zap-macos/zap-macos.dmg "$d/zap-macos.dmg" || true
          cp artifacts/site-zap-windows/zap-windows.zip "$d/zap-windows.zip" || true
          cp artifacts/site-zap-linux/zap-linux.deb "$d/zap-linux.deb" || true
          ls -la "$d"
      - name: Commit + push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/zap/download
          if git diff --cached --quiet; then
            echo "No installer changes to publish."
            exit 0
          fi
          git commit -m "chore(site): publish ${GITHUB_REF_NAME} Zap installers"
          git pull --rebase origin main
          git push origin HEAD:main
